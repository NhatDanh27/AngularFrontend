
<div class="login-container">
    <div class="login-card">
        <img src="/ANNHOME.png" alt="Logo" class="logo">
        
   
        <div *ngIf="errorMessage" style="color: red; text-align: center; margin-bottom: 15px; font-size: 0.9rem;">
            {{ errorMessage }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                
                <input type="text" id="tenDangNhap" formControlName="tenDangNhap" placeholder="Tên đăng nhập">
                <small style="color: red;" *ngIf="loginForm.get('tenDangNhap')?.invalid && loginForm.get('tenDangNhap')?.touched" class="error-text">
                    Vui lòng nhập tên đăng nhập.
                </small>
            </div>
          
            <div class="form-group">
                
                <input type="password" id="password" formControlName="matKhau" placeholder="Mật khẩu">
                <small style="color: red;" *ngIf="loginForm.get('matKhau')?.invalid && loginForm.get('matKhau')?.touched" class="error-text">
                    Mật khẩu không được để trống.
                </small>
            </div>
            
            <button type="submit" [disabled]="loginForm.invalid || isLoading">
                {{ isLoading ? 'Đang xử lý...' : 'Đăng nhập' }}
            </button>
        </form>

        
    </div>
</div>
