<div class="profile-container">
  
  <div class="profile-card">
    
    <div class="profile-header">
      <h2>Thông tin thực tập sinh</h2>
      <p class="subtitle">Vui lòng điền và cập nhật thông tin hồ sơ thực tập của bạn</p>
    </div>

    <form class="profile-body">
      <div class="form-grid">
        
        <div class="input-group">
          <label for="hoten">Họ và tên <span class="required">*</span></label>
          <input type="text" id="hoten" name="hoten" [(ngModel)]="editableProfile.hoten" placeholder="Nhập họ và tên đầy đủ">
        </div>
        
        <div class="input-group">
          <label for="ngaysinh">Ngày sinh</label>
          <input type="date" id="ngaysinh" name="ngaysinh" [(ngModel)]="editableProfile.ngaysinh">
        </div>

        <div class="input-group">
          <label for="sdt">Số điện thoại</label>
          <input type="tel" id="sdt" name="sdt" [(ngModel)]="editableProfile.sdt" placeholder="Ví dụ: 0912345678">
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" [(ngModel)]="editableProfile.email" placeholder="Ví dụ: email@domain.com">
        </div>

        <div class="input-group">
          <label for="truong">Trường học</label>
          <input type="text" id="truong" name="truong" [(ngModel)]="editableProfile.truong" placeholder="Nhập tên trường">
        </div>

        <div class="input-group">
          <label for="nganh">Chuyên ngành</label>
          <input type="text" id="nganh" name="nganh" [(ngModel)]="editableProfile.nganh" placeholder="Nhập chuyên ngành">
        </div>

        <div class="input-group" style="width: 40%;">
          <label for="vitri">Vị trí thực tập</label>
          <select id="vitri" name="vitri" [(ngModel)]="editableProfile.vitri" class="form-control">
            <option value="" disabled selected>--Chọn vị trí--</option>
            <option value="IT">IT</option>
            <option value="Media">Media</option>
            <option value="Design">Design</option>
            <option value="Marketing">Marketing</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        
        <div class="input-group full-width">
          <label for="linkfb">Link Facebook (Tùy chọn)</label>
          <input type="url" id="linkfb" name="linkfb" [(ngModel)]="editableProfile.linkfb" placeholder="https://facebook.com/your-profile">
        </div>
      </div>
    </form>

    <div class="profile-footer">
      <button type="button" class="btn-submit" (click)="onSave()">Lưu thay đổi</button>
    </div>

  </div>
</div>
